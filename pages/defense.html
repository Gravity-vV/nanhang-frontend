<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全防御</title>
  <style>
    :root {
      --bg-panel: #f8fafc;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Bahnschrift", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      background: #ffffff;
      color: #0f172a;
      overflow: auto;
    }

    .page {
      height: 100%;
      padding: 16px;
      display: grid;
      grid-template-rows: 3fr 2fr;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-panel);
    }

    .top-panel {
      position: relative;
      overflow: hidden;
    }

    .top-panel img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #ffffff;
    }

    .bottom {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 10px;
    }

    .bottom .card {
      background: #020810;
      border: 1px solid #1e3047;
      border-radius: 10px;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      color: #2ef8a2;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #1a2f45;
      padding-bottom: 8px;
      font-family: "Consolas", "Courier New", monospace;
      font-weight: 600;
    }

    .terminal {
      margin-top: 10px;
      border: 0;
      border-radius: 0;
      background: transparent;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .terminal-body {
      padding: 4px 2px 6px;
      display: grid;
      gap: 14px;
      overflow: auto;
    }

    .log-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      color: #23f58f;
      line-height: 1.9;
      word-break: break-all;
    }

    .log-row::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2dff95;
      margin-top: 6px;
      flex: 0 0 auto;
    }

    .log-time {
      color: #22f78f;
      flex: 0 0 auto;
      font-weight: 600;
    }

    .log-text {
      color: #1df08a;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100%;
        grid-template-rows: auto auto;
      }

      .top-panel {
        min-height: 300px;
      }

      .bottom {
        grid-template-columns: 1fr;
      }
    }

    .top-panel.card {
      border-color: #e9edf3;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="top-panel card">
      <img src="../assets/fangyu.png" alt="安全防御态势图" />
    </section>

    <section class="bottom">
      <article class="panel card">
        <h2 class="panel-title">攻击分析与威胁事件明细</h2>
        <div class="terminal">
          <div class="terminal-body">
            <div class="log-row">
              <span class="log-time">[22:33:10]</span>
              <span class="log-text">高频重接入攻击 | 无人机ID=UAV-1007 | 公钥=03A9F12C8D7E44B1</span>
            </div>
            <div class="log-row">
              <span class="log-time">[22:33:14]</span>
              <span class="log-text">自私接入攻击 | 无人机ID=UAV-2033 | 公钥=021BC77DE90AF5C4</span>
            </div>
          </div>
        </div>
      </article>

      <article class="panel card">
        <h2 class="panel-title">处置记录</h2>
        <div class="terminal">
          <div class="terminal-body">
            <div class="log-row">
              <span class="log-time">[22:33:21]</span>
              <span class="log-text">无人机ID=UAV-1007 | 公钥=03A9F12C8D7E44B1 | 因高频重接入攻击加入黑名单</span>
            </div>
            <div class="log-row">
              <span class="log-time">[22:33:24]</span>
              <span class="log-text">无人机ID=UAV-2033 | 公钥=021BC77DE90AF5C4 | 因自私接入攻击加入黑名单</span>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
