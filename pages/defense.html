<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全防御</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      color: #0f172a;
      overflow: auto;
    }

    .page {
      height: 100%;
      display: grid;
      grid-template-rows: 3fr 2fr;
      gap: 0;
    }

    .image-wrap {
      display: grid;
      gap: 20px;
      padding: 16px;
      background: #f0f4f8;
      height: 100%; /* 确保填满 grid 容器的第一行 */
    }

    .canvas {
      background: #ffffff;
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 80px;
      /* padding: 0 20px; */
    }

    .left-area {
      flex: 1; 
      height: 100%; 
      background: #ffffff; 
      position: relative;
      border-radius: 12px;
      border: 1px solid #d1d5db; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .right-area {
      flex: 1; 
      height: 100%; 
      background: #ffffff; 
      position: relative;
      border-radius: 12px;
      border: 1px solid #d1d5db; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    

    .area-title1 {
      background: linear-gradient(to right, #2b4c7e, #567ebb);
      color: white;
      padding: 8px 16px;
      font-weight: bold;
      font-size: 20px;
      border-radius: 10px 10px 0 0;
      margin: 4px;
    }

    .area-title2 {
      background: linear-gradient(to right, #2b4c7e, #567ebb);
      color: white;
      padding: 8px 16px;
      font-weight: bold;
      font-size: 20px;
      border-radius: 10px 10px 0 0;
      margin: 4px;
    }

    .m-line-fail {
      stroke: #f97316;
      stroke-width: 1;
    }

    /* 成功连线样式*/
    .m-line-success {
      stroke: #64748b;
      stroke-width: 1;
    }

    .m-line-connect {
      stroke: #000;
      stroke-width: 1;
    }

    .m-line-attack {
      stroke: #ef4444;
      stroke-width: 1;
    }

    .element {
      position: absolute;
      pointer-events: none;
    }
    .connection-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .uav-label {
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      margin-top: 4px;
    }
    .status-text {
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }
    .status-text.fail {
      color: #f97316;
    }
    .status-text.success {
      color: #16a34a;
    }



    .top-panel {
      overflow: hidden;
    }

    .top-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #ffffff;
    }

    .bottom-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .left-panel {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .controls {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 12px 30px;
      display: grid;
      gap: 10px;
      min-height: 124px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-btn {
      border: 1px solid #0f5f82;
      border-radius: 8px;
      background: #186487;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 3px 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 100, 135, 0.24);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .input-row label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .blacklist-area {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: #fef2f2;
        border-radius: 24px;
        border: 1px solid #fecaca;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);

        overflow: visible;
        contain: layout paint;
    }

    .blacklist-label {
        font-weight: bold;
        color: #dc2626;
        font-size: 15px;
        text-align: center;
    }

    .blacklist-count {
        background: #dc2626;
        color: white;
        border-radius: 20px;
        min-width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 15px;
        padding: 0 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .blacklist-select {
      margin-left: 8px;
      font-size: 12px;
      color: #7f1d1d;
      max-width: 320px;
      min-width: 160px;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 4px 6px;
      background: #ffffff;
      -webkit-overflow-scrolling: touch;
    }

    .count-input {
      width: 100%;
      max-width: 100%;
      height: 28px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      padding: 0 34px 0 10px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .count-input::-webkit-outer-spin-button,
    .count-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .count-input-wrap {
      position: relative;
      width: 180px;
      max-width: 100%;
      height: 28px;
    }

    .time-input-wrap {
      width: 100px;
      max-width: 100%;
    }

    .time-input {
      height : 20px;
      padding-right: 10px;
    }

    .count-stepper {
      position: absolute;
      right: 4px;
      top: 0px;
      bottom: 0px;
      width: 24px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
    }

    .count-step-btn {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #f8fafc;
      color: #334155;
      font-size: 10px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .count-step-btn:hover:not(:disabled) {
      background: #eef2ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    .count-step-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .count-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.14);
    }

    .status {
      margin: 0;
      font-size: 13px;
      color: #1d4ed8;
      font-weight: 600;
      min-height: 0;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flow-area {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 6px 8px;
      display: grid;
      align-content: start;
      gap: 2px;
      overflow: visible;
      min-height: 0;
    }

    .flow-group {
      display: grid;
      gap: 8px;
    }

    .flow-title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .flow-wrap {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      overflow: visible;
      display: flex;
      justify-content: flex-start;
    }

    .flow-svg {
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 260;
    }

    .flow-base {
      fill: none;
      stroke: #8ab8de;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #2563eb;
      stroke-width: 24;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.6));
    }

    .flow-node {
      fill: #ffffff;
      stroke: #93a4b5;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #ffffff;
      stroke: #2563eb;
    }

    .flow-node.is-active {
      fill: #ffffff;
      stroke: #1d4ed8;
      stroke-width: 4;
    }

    .flow-label {
      fill: #111827;
      font-size: 24px;
      font-weight: 600;
      user-select: none;
    }

    .flow-label-small {
      fill: #111827;
      font-size: 19px;
      font-weight: 600;
      user-select: none;
    }

    .flow-label-long {
      fill: #111827;
      font-size: 16px;
      font-weight: 600;
      user-select: none;
    }

    .flow-heading {
      fill: #1d9bf0;
    }

    .right-panel {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .log-box {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #ffffff;
      color: #3b82f6;
      padding: 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .log-title {
      margin: 0;
      font-size: 15px;
      color: #3b82f6;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .log-content {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      color: #3b82f6;
      line-height: 1.6;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
    }

    .log-content li {
      margin: 0 0 8px;
      word-break: break-word;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      margin-top: 6px;
      flex: 0 0 auto;
      box-shadow: 0 0 6px rgba(59, 130, 246, 0.75);
    }

    .log-metric {
      margin: 0;
      padding-top: 6px;
      border-top: 1px dashed rgba(148, 163, 184, 0.45);
      font-size: 12px;
      font-weight: 700;
      color: #3b82f6;
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .bottom-layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        grid-template-columns: 1fr;
        grid-auto-rows: minmax(180px, 1fr);
      }
    }

    @media (max-width: 760px) {
      .btn-row {
        grid-template-columns: 1fr;
      }

      .count-input-wrap {
        width: 100%;
      }

      .time-input-wrap {
        width: 100%;
      }

      .status {
        flex-basis: 100%;
        white-space: normal;
      }

      .flow-svg {
        width: 100%;
      }

      .flow-label {
        font-size: 19px;
      }

      .flow-label-small {
        font-size: 16px;
      }

      .flow-label-long {
        font-size: 14px;
      }
    }
  </style>
</head>

    <section class="bottom-layout">
      <article class="left-panel">
        <div class="controls">
          <div class="btn-row">
            <button class="action-btn" id="selfish-btn" type="button">自私接入攻击测试</button>
            <button class="action-btn" id="highfreq-btn" type="button">高频重接入攻击测试</button>
          </div>
          <div class="input-row">

                <label for="test-count">测试次数</label>
                <div class="count-input-wrap">
                  <input id="test-count" class="count-input" type="number" min="5" max="10" value="5">

                </div>
              </div>
              <p class="status" id="status-text">等待开始测试...</p>
            </div>

              <span class="blacklist-label">🚫</span>

              <span class="blacklist-count" id="blacklist-count">0</span>
              <select id="blacklist-select" class="blacklist-select" size="4"></select>
            </div>
          </div>
        </div>

        <div class="flow-area">
          <div class="flow-wrap">
            <svg class="flow-svg" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" aria-label="攻击处置流程图">
              <text class="flow-label-small flow-heading" x="70" y="28">自私接入攻击流程</text>
              <path class="flow-base" d="M60 62 L760 62" />

              <path id="selfish-seg-0" class="flow-active" d="M60 62 L150 62" />
              <path id="selfish-seg-1" class="flow-active" d="M150 62 L350 62" />
              <path id="selfish-seg-2" class="flow-active" d="M350 62 L550 62" />
              <path id="selfish-seg-3" class="flow-active" d="M550 62 L760 62" />

              <circle id="selfish-node-0" class="flow-node" cx="150" cy="62" r="10" />
              <circle id="selfish-node-1" class="flow-node" cx="350" cy="62" r="10" />
              <circle id="selfish-node-2" class="flow-node" cx="550" cy="62" r="10" />
              <circle id="selfish-node-3" class="flow-node" cx="760" cy="62" r="10" />

              <text class="flow-label-long" x="150" y="104" text-anchor="middle">
                <tspan x="150" dy="0">无人机发送ID</tspan>
                <tspan x="150" dy="16">和公钥</tspan>
              </text>
              <text class="flow-label-small" x="350" y="116" text-anchor="middle">查询区块链</text>
              <text class="flow-label-small" x="550" y="116" text-anchor="middle">匹配信息</text>
              <text class="flow-label-small" x="760" y="116" text-anchor="middle">加入黑名单</text>

              <text class="flow-label-small flow-heading" x="70" y="154">高频重接入攻击流程</text>
              <path class="flow-base" d="M80 184 L680 184" />

              <path id="highfreq-seg-0" class="flow-active" d="M80 184 L180 184" />
              <path id="highfreq-seg-1" class="flow-active" d="M180 184 L430 184" />
              <path id="highfreq-seg-2" class="flow-active" d="M430 184 L680 184" />

              <circle id="highfreq-node-0" class="flow-node" cx="180" cy="184" r="10" />
              <circle id="highfreq-node-1" class="flow-node" cx="430" cy="184" r="10" />
              <circle id="highfreq-node-2" class="flow-node" cx="680" cy="184" r="10" />

              <text class="flow-label-small" x="180" y="228" text-anchor="middle">高频重接入</text>
              <text class="flow-label-small" x="430" y="228" text-anchor="middle">记录违规行为</text>
              <text class="flow-label-small" x="680" y="228" text-anchor="middle">加入黑名单</text>
            </svg>
          </div>
        </div>
      </article>

      <article class="right-panel">
        <section class="log-box">
          <h3 class="log-title">攻击分析终端日志</h3>
          <ul class="log-content" id="analysis-log"></ul>
          <p class="log-metric" id="analysis-metric">攻击分析测试识别率：--</p>
        </section>

        <section class="log-box">
          <h3 class="log-title">处置记录终端日志</h3>
          <ul class="log-content" id="dispose-log"></ul>
          <p class="log-metric" id="dispose-metric">处置记录已处置ID：--</p>
        </section>
      </article>
    </section>
  </main>

  <script>
    (function () {
      const DEFAULT_TEST_COUNT = 5;
      const MIN_TEST_COUNT = 5;
      const MAX_TEST_COUNT = 10;
      const DEFAULT_HIGHFREQ_INTERVAL_MS = 800;
      const MIN_HIGHFREQ_INTERVAL_MS = 1;
      const MAX_HIGHFREQ_INTERVAL_MS = 60000;
      const HIGHFREQ_INTERVAL_THRESHOLD_MS = 1000;

      const selfishBtn = document.getElementById('selfish-btn');
      const highfreqBtn = document.getElementById('highfreq-btn');
      const testCountInput = document.getElementById('test-count');
      const highfreqIntervalInput = document.getElementById('highfreq-interval');
      const testCountUpBtn = document.getElementById('test-count-up');
      const testCountDownBtn = document.getElementById('test-count-down');
      const statusText = document.getElementById('status-text');
      const analysisLog = document.getElementById('analysis-log');
      const disposeLog = document.getElementById('dispose-log');
      const analysisMetric = document.getElementById('analysis-metric');
      const disposeMetric = document.getElementById('dispose-metric');

      let running = false;
      let selfishBlacklist = new Set();  // 自私接入攻击黑名单
      let highfreqBlacklist = new Set(); // 高频重接入攻击黑名单

      const flows = {
        selfish: {
          segments: [
            document.getElementById('selfish-seg-0'),
            document.getElementById('selfish-seg-1'),
            document.getElementById('selfish-seg-2'),
            document.getElementById('selfish-seg-3')
          ],
          nodes: [
            document.getElementById('selfish-node-0'),
            document.getElementById('selfish-node-1'),
            document.getElementById('selfish-node-2'),
            document.getElementById('selfish-node-3')
          ]
        },
        highfreq: {
          segments: [
            document.getElementById('highfreq-seg-0'),
            document.getElementById('highfreq-seg-1'),
            document.getElementById('highfreq-seg-2')
          ],
          nodes: [
            document.getElementById('highfreq-node-0'),
            document.getElementById('highfreq-node-1'),
            document.getElementById('highfreq-node-2')
          ]
        }
      };

      function nowTime() {
        return new Date().toLocaleTimeString('zh-CN', { hour12: false });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function parseCount() {
        const raw = testCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_TEST_COUNT;
        }
        if (!/^\d+$/.test(raw)) {
          return null;
        }
        const value = Number(raw);
        if (value < MIN_TEST_COUNT || value > MAX_TEST_COUNT) {
          return null;
        }
        return value;
      }

      function clampCount(value) {
        return Math.min(MAX_TEST_COUNT, Math.max(MIN_TEST_COUNT, value));
      }

      function parseHighfreqInterval() {
        if (!highfreqIntervalInput) {
          return DEFAULT_HIGHFREQ_INTERVAL_MS;
        }
        const raw = highfreqIntervalInput.value.trim();
        if (raw === '') {
          return DEFAULT_HIGHFREQ_INTERVAL_MS;
        }
        if (!/^\d+$/.test(raw)) {
          return null;
        }
        const value = Number(raw);
        if (value < MIN_HIGHFREQ_INTERVAL_MS || value > MAX_HIGHFREQ_INTERVAL_MS) {
          return null;
        }
        return value;
      }

      function getStepperBaseCount() {
        const raw = testCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_TEST_COUNT;
        }
        const parsed = Number(raw);
        if (!Number.isFinite(parsed)) {
          return DEFAULT_TEST_COUNT;
        }
        return clampCount(Math.round(parsed));
      }

      function adjustCount(delta) {
        if (testCountInput.disabled) {
          return;
        }
        testCountInput.value = String(clampCount(getStepperBaseCount() + delta));
      }

      function appendLog(target, device, message) {
        const li = document.createElement('li');
        const dot = document.createElement('span');
        dot.className = 'dot';
        li.appendChild(dot);
        li.appendChild(document.createTextNode('[' + nowTime() + '] [' + device + '] ' + message));
        target.appendChild(li);
        target.scrollTop = target.scrollHeight;
      }

      function resetMetrics() {
        analysisMetric.textContent = '攻击分析测试通过率：--';
        disposeMetric.textContent = '处置记录已处置ID：--';
      }

      function setRunningMetrics() {
        analysisMetric.textContent = '攻击分析测试通过率：测试进行中...';
        disposeMetric.textContent = '处置记录已处置ID：测试进行中...';
      }

      function setPassMetrics(passed, total) {
        const rate = total > 0 ? (passed / total) * 100 : 0;
        const text = rate.toFixed(1) + '%（' + passed + '/' + total + '）';
        analysisMetric.textContent = '攻击分析测试通过率：' + text;
        disposeMetric.textContent = '处置记录已处置ID：' + passed + ' 个';
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function hidePath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = path.dataset.total;
      }

      function setNode(node, visited, active) {
        node.classList.toggle('is-visited', Boolean(visited));
        node.classList.toggle('is-active', Boolean(active));
        node.setAttribute('r', active ? '14' : '10');
      }

      function resetFlow(flowName) {
        const flow = flows[flowName];
        flow.segments.forEach(hidePath);
        flow.nodes.forEach((node) => setNode(node, false, false));
      }

      function initFlows() {
        Object.keys(flows).forEach((name) => {
          flows[name].segments.forEach(initPath);
          resetFlow(name);
        });
      }

      function animatePath(path, duration) {
        return new Promise((resolve) => {
          path.style.transition = 'none';
          path.style.strokeDashoffset = path.dataset.total;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = '0';
            });
          });

          window.setTimeout(resolve, duration + 30);
        });
      }

      // ========== 官方标准 Remote ID 生成（GB 46750-2025 + CTA-2063-A）==========
      function generateId() {
        // 1. 厂商代码（3位大写字母，中国民航/CTA标准）
        const mfrCodes = ['DJI', 'Dji', 'FLR', 'AUT', 'P3X', 'ZHY']; // 大疆、飞米、极飞等
        const mfr = mfrCodes[Math.floor(Math.random() * mfrCodes.length)];

        // 2. 型号代码（2位字母/数字）
        const modelChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 无IO01
        const model = Array.from({ length: 2 }, () => 
          modelChars[Math.floor(Math.random() * modelChars.length)]
        ).join('');

        // 3. 10位唯一序列号（数字+大写字母，无歧义）
        const serialChars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        const serial = Array.from({ length: 10 }, () => 
          serialChars[Math.floor(Math.random() * serialChars.length)]
        ).join('');

        // 4. 拼接：官方 Remote ID（CTA-2063-A 格式）
        return `${mfr}-${model}-${serial}`;
      }

      function updateBlacklistDisplay() {
        const totalBlacklist = Array.from(new Set([...selfishBlacklist, ...highfreqBlacklist]));
        const blacklistCountElem = document.getElementById('blacklist-count');
        const blacklistSelect = document.getElementById('blacklist-select');
        if (blacklistCountElem) {
          blacklistCountElem.textContent = totalBlacklist.length;
        }
        if (!blacklistSelect) return;
        // 清空并填充选项
        blacklistSelect.innerHTML = '';
        if (totalBlacklist.length === 0) {
          const opt = document.createElement('option');
          opt.textContent = '—';
          opt.disabled = true;
          blacklistSelect.appendChild(opt);
        } else {
          totalBlacklist.forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id;
            blacklistSelect.appendChild(opt);
          });
          // 选中最后一项并滚动到可见
          blacklistSelect.selectedIndex = totalBlacklist.length - 1;
          blacklistSelect.scrollTop = blacklistSelect.scrollHeight;
        }
      }

      async function pulseNode(node) {
        setNode(node, true, true);
        await sleep(220);
        setNode(node, true, false);
      }

      async function playStep(flowName, stepIndex) {
        const flow = flows[flowName];
        const path = flow.segments[stepIndex];
        const node = flow.nodes[stepIndex];
        await animatePath(path, 420);
        await pulseNode(node);
      }

      function setRunningState(isRunning) {
        running = isRunning;
        selfishBtn.disabled = isRunning;
        highfreqBtn.disabled = isRunning;
        testCountInput.disabled = isRunning;
        if (highfreqIntervalInput) {
          highfreqIntervalInput.disabled = isRunning;
        }
        if (testCountUpBtn) {
          testCountUpBtn.disabled = isRunning;
        }
        if (testCountDownBtn) {
          testCountDownBtn.disabled = isRunning;
        }
      }

      async function runSelfish(count) {
        statusText.textContent = '正在执行：自私接入攻击测试';
        let passed = 0;

        for (let i = 1; i <= count; i += 1) {
          appendLog(analysisLog, '接入点', '第' + i + '次测试开始');
          appendLog(disposeLog, '区块链', '第' + i + '次测试开始');

          resetFlow('selfish');
          await playStep('selfish', 0);
          appendLog(analysisLog, '接入点', '检测到自私接入攻击，无人机发送ID和公钥');
          await sleep(180);

          await playStep('selfish', 1);
          appendLog(analysisLog, '区块链', '查询区块链身份信息');
          await sleep(180);

          await playStep('selfish', 2);
          appendLog(analysisLog, '区块链', '匹配信息完成，判定异常接入');
          await sleep(180);

          await playStep('selfish', 3);
          const id = generateId();
          selfishBlacklist.add(id);
          appendLog(disposeLog, '接入点', '无人机加入黑名单（原因：自私接入攻击，ID=' + id + '）');
          updateBlacklistDisplay();
          await sleep(260);
          passed += 1;
        }

        return passed;
      }

      async function runHighfreq(count) {
        statusText.textContent = '正在执行：高频重接入攻击测试';
        const intervalMs = parseHighfreqInterval();
        if (intervalMs === null) {
          statusText.textContent = '输入错误：接入时间间隔需为 ' + MIN_HIGHFREQ_INTERVAL_MS + '-' + MAX_HIGHFREQ_INTERVAL_MS + ' 的整数（ms）';
          appendLog(
            analysisLog,
            '接入点',
            '参数校验失败：接入时间间隔需为 ' + MIN_HIGHFREQ_INTERVAL_MS + '-' + MAX_HIGHFREQ_INTERVAL_MS + ' 的整数（ms）'
          );
          return null;
        }
        const isHighfreq = intervalMs <= HIGHFREQ_INTERVAL_THRESHOLD_MS;
        appendLog(
          analysisLog,
          '接入点',
          '高频判定：接入时间间隔=' + intervalMs + 'ms，阈值<= ' + HIGHFREQ_INTERVAL_THRESHOLD_MS + 'ms'
        );
        let passed = 0;

        for (let i = 1; i <= count; i += 1) {
          appendLog(analysisLog, '接入点', '第' + i + '次测试开始');
          appendLog(disposeLog, '区块链', '第' + i + '次测试开始');

          resetFlow('highfreq');
          await playStep('highfreq', 0);
          if (!isHighfreq) {
            for(let i =1;i<=5;i+=1){
              appendLog(analysisLog, '接入点', '收到接入请求');
              await sleep(intervalMs);
            }
            appendLog(analysisLog, '接入点', '接入时间间隔未达到高频条件，本次不记录违规行为');
            continue;
          }
          for(let i =1;i<=5;i+=1){
            appendLog(analysisLog, '接入点', '收到接入请求');
            await sleep(intervalMs);
          }
          appendLog(analysisLog, '接入点', '检测到高频重接入行为（接入时间间隔=' + intervalMs + 'ms）');
          await sleep(180);

          await playStep('highfreq', 1);
          appendLog(analysisLog, '区块链', '记录违规行为到链上');
          await sleep(180);

          await playStep('highfreq', 2);
          const id = generateId();
          highfreqBlacklist.add(id);
          appendLog(disposeLog, '接入点', '无人机加入黑名单（原因：高频重接入攻击，ID=' + id + '）');
          updateBlacklistDisplay();
          await sleep(260);
          passed += 1;
        }

        return passed;
      }

      async function startTest(type) {
        if (running) {
          return;
        }

        const count = parseCount();
        if (count === null) {
          statusText.textContent = '输入错误：测试次数需为 ' + MIN_TEST_COUNT + '-' + MAX_TEST_COUNT + ' 的整数';
          appendLog(
            analysisLog,
            '接入点',
            '参数校验失败：测试次数需为 ' + MIN_TEST_COUNT + '-' + MAX_TEST_COUNT + ' 的整数'
          );
          return;
        }

        setRunningState(true);
        setRunningMetrics();
        resetFlow('selfish');
        resetFlow('highfreq');
        let passed = 0;

        if (type === 'selfish') {
          passed = await runSelfish(count);
          statusText.textContent = '自私接入攻击测试完成，共执行 ' + count + ' 次';
        } else {
          passed = await runHighfreq(count);
          if (passed === null) {
            resetMetrics();
            setRunningState(false);
            return;
          }
          statusText.textContent = '高频重接入攻击测试完成，共执行 ' + count + ' 次';
        }

        setPassMetrics(passed, count);
        setRunningState(false);
      }

      selfishBtn.addEventListener('click', function () {
        startTest('selfish');
      });

      highfreqBtn.addEventListener('click', function () {
        startTest('highfreq');
      });

      if (testCountUpBtn) {
        testCountUpBtn.addEventListener('click', function () {
          adjustCount(1);
        });
      }

      if (testCountDownBtn) {
        testCountDownBtn.addEventListener('click', function () {
          adjustCount(-1);
        });
      }

      initFlows();
      resetMetrics();
      appendLog(analysisLog, '接入点', '系统就绪，等待攻击测试指令');
      appendLog(disposeLog, '区块链', '黑名单服务在线，等待处置事件');
    })();
  </script>
